<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LWV Cafe — Cashier Terminal</title>
    <style>
        :root {
            --bg-env: #92b07a;       /* Brand Leafy Light Green */
            --bg-panel: #ffffff;     /* Clean White Containers */
            --bg-item: #f4f7f2;      /* Soft Sage Tinted Base */
            --text-main: #2c3a22;    /* Deep Forest Accent Text */
            --text-dark: #000000;
            --border: #d2ded0;       /* Border Tint to Match */
            --accent-accent: #557241;
            --radius-main: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-env);
            color: var(--text-dark);
            height: 100vh;
            width: 100vw;
            padding: 16px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .kiosk-container {
            width: 100%;
            max-width: 1440px;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 16px;
        }

        /* MENU SECTION PANELS */
        .menu-section {
            background: var(--bg-panel);
            border-radius: var(--radius-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative; /* For bottom-left watermark placement */
        }

        .brand-header-wrapper {
            margin-bottom: 14px;
            flex-shrink: 0;
        }
        .brand-logo-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: bold;
            font-size: 2.4rem;
            color: var(--text-main);
            line-height: 1;
            letter-spacing: -1px;
        }
        .brand-logo-sub {
            font-family: system-ui, sans-serif;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
            margin-left: 4px;
        }
        .sub-tagline {
            font-size: 0.85rem;
            color: #607058;
            margin-top: 4px;
            margin-left: 4px;
        }

        /* Fixed Navigation Scroller */
        .category-nav {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            background: var(--bg-item);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-main);
            cursor: pointer;
            white-space: nowrap;
        }
        .cat-btn.active {
            background: var(--text-main);
            color: #ffffff;
            border-color: var(--text-main);
        }

        .menu-scroll-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
            margin-bottom: 20px; /* Space for watermark footer */
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 10px;
        }

        .menu-item {
            background: var(--bg-item);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        .menu-item:hover {
            border-color: var(--text-main);
            background: #edf2ea;
        }

        .menu-item .icon { font-size: 1.8rem; display: block; margin-bottom: 4px; }
        .menu-item .name { font-weight: 600; font-size: 0.8rem; display: block; color: var(--text-dark); line-height: 1.2; height: 2.4em; overflow: hidden; }
        .menu-item .price { color: var(--text-main); font-size: 0.8rem; margin-top: 4px; display: block; font-weight: 700; }

        /* Subtle Watermark Branding */
        .watermark-footer {
            position: absolute;
            bottom: 8px;
            left: 20px;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 0.75rem;
            color: #b0c2a8; /* Blends nicely with the ecosystem background */
            user-select: none;
            pointer-events: none;
        }

        /* RECEIPT VIEWPORT PANELS */
        .receipt-section {
            background: var(--bg-panel);
            padding: 20px;
            border-radius: var(--radius-main);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .receipt-scroll {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        #receipt-paper {
            width: 100%;
            background: #ffffff;
            border: 1px dashed #b5b2ae;
            padding: 16px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.4;
            color: #000;
        }

        .receipt-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
        .receipt-header h3 { margin: 0 0 2px 0; font-size: 18px; font-family: 'Georgia', serif; font-weight: 800; letter-spacing: -0.5px; }
        .receipt-header p { margin: 2px 0; font-size: 10px; color: #333; }

        .receipt-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dotted #e5e5e5;
        }

        .item-details {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
        }
        .item-details > span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .qty-controls {
            display: inline-flex;
            align-items: center;
            background: #f0f0f0;
            border-radius: 4px;
            padding: 1px;
            flex-shrink: 0;
            font-family: system-ui, sans-serif;
        }

        .qty-btn {
            border: none;
            background: #ffffff;
            font-weight: bold;
            font-size: 11px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        
        .qty-val {
            font-weight: 700;
            padding: 0 4px;
            font-size: 11px;
            min-width: 14px;
            text-align: center;
        }

        .receipt-total {
            border-top: 1px dashed #000;
            margin-top: 12px;
            padding-top: 10px;
            font-weight: bold;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }

        .action-buttons { width: 100%; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-main { background: var(--text-main); color: white; }
        .btn-main:hover { background: var(--accent-accent); }
        .btn-clear { background: var(--bg-item); color: var(--text-main); border: 1px solid var(--border); }
        .btn-clear:hover { background: #e4ecd1; }

        /* RESPONSIVE LAYOUT BREAKPOINTS */
        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; }
            .kiosk-container { grid-template-columns: 1fr; height: auto; }
            .menu-section, .receipt-section { height: auto; max-height: 600px; }
            .menu-scroll-container, .receipt-scroll { overflow-y: auto; }
            .watermark-footer { position: relative; left: 4px; bottom: 0; margin-top: 4px; }
        }

        @media print {
            body * { visibility: hidden; }
            #receipt-paper, #receipt-paper * { visibility: visible; }
            #receipt-paper { position: absolute; left: 0; top: 0; width: 100%; border: none; }
            .qty-controls { background: none; padding: 0; }
            .qty-btn { display: none; }
            .qty-val { font-size: 12px; }
            .qty-val::after { content: 'x'; }
        }
    </style>
</head>

    let currentOrder = {};
    let activeCategory = 'all';

    function initMenu() {
        renderGrid();
        const now = new Date();
        document.getElementById('receipt-date').innerText = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function renderGrid() {
        const grid = document.getElementById('menu-grid');
        const targetItems = activeCategory === 'all' 
            ? menuItems 
            : menuItems.filter(item => item.cat === activeCategory);

        grid.innerHTML = targetItems.map(item => `
            <div class="menu-item" onclick="changeQty('${item.id}', 1)">
                <span class="icon">${item.icon}</span>
                <span class="name">${item.name}</span>
                <span class="price">₱${item.price.toFixed(2)}</span>
            </div>
        `).join('');
    }

    function switchCategory(cat, btn) {
        activeCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    }

    function changeQty(id, modifier) {
        if (!currentOrder[id] && modifier > 0) {
            const menuItem = menuItems.find(m => m.id === id);
            currentOrder[id] = { ...menuItem, qty: 0 };
        }

        if (currentOrder[id]) {
            currentOrder[id].qty += modifier;
            if (currentOrder[id].qty <= 0) {
                delete currentOrder[id];
            }
        }
        renderReceipt();
    }

    function clearOrder() {
        currentOrder = {};
        renderReceipt();
    }

    function renderReceipt() {
        const container = document.getElementById('receipt-items');
        let total = 0;
        let html = '';

        for (const id in currentOrder) {
            const item = currentOrder[id];
            const itemTotal = item.price * item.qty;
            total += itemTotal;

            html += `
                <div class="receipt-row">
                    <div class="item-details">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${id}', -1)">-</button>
                            <span class="qty-val">${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
                        </div>
                        <span>${item.name}</span>
                    </div>
                    <span>₱${itemTotal.toFixed(2)}</span>
                </div>
            `;
        }

        container.innerHTML = html || '<div style="color:#888; text-align:center; padding: 25px 0;">No items loaded</div>';
        document.getElementById('receipt-total-val').innerText = `₱${total.toFixed(2)}`;
    }

    initMenu();
    renderReceipt();
</script>
</body>
</html>
